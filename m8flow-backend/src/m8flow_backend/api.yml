openapi: "3.0.2"
info:
  version: 1.0.0
  title: m8flow-backend-extension
paths:
  /ping:
    get:
      summary: Health check for load balancers and monitoring
      description: Returns 200 when the process is up. Public, no authentication required.
      operationId: m8flow_backend.tenancy.health_check
      tags:
        - Health
      security: []
      responses:
        "200":
          description: The server is running.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /tenant-login-url:
    get:
      summary: Get Keycloak login URL for a tenant selection (unauthenticated)
      description: Checks that the tenant exists locally and returns the shared-realm authorization URL for that tenant selection.
      operationId: m8flow_backend.routes.keycloak_controller.get_tenant_login_url
      tags:
        - Keycloak
      security: []
      parameters:
        - name: tenant
          in: query
          required: true
          schema:
            type: string
          description: Tenant alias or id to look up before redirecting to the shared realm
      responses:
        "200":
          description: Tenant exists; shared-realm login URL returned
          content:
            application/json:
              schema:
                type: object
                required:
                  - login_url
                properties:
                  login_url:
                    type: string
                    description: Keycloak authorization (login) base URL for the shared realm
                  realm:
                    type: string
                    description: Shared realm authentication identifier
        "400":
          description: Bad request - tenant missing
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string

  /organization-memberships:
    get:
      summary: Get the authenticated user's organization memberships with display names
      description: Returns the current user's shared-realm organization memberships and resolves each membership to the organization display name stored by M8Flow.
      operationId: m8flow_backend.routes.keycloak_controller.get_current_user_organization_memberships
      tags:
        - Keycloak
      security: []
      responses:
        "200":
          description: Resolved organization memberships
          content:
            application/json:
              schema:
                type: object
                required:
                  - organizations
                properties:
                  organizations:
                    type: array
                    items:
                      type: object
                      required:
                        - alias
                      properties:
                        alias:
                          type: string
                        id:
                          type: string
                          nullable: true
                        name:
                          type: string
                          nullable: true
        "401":
          description: Authentication token missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tenant-realms:
    post:
      summary: Create a tenant organization in the shared realm
      description: Creates a Keycloak organization in the configured shared realm and ensures a tenant record exists. The endpoint name is legacy, but the backend now provisions organizations instead of realms.
      operationId: m8flow_backend.routes.keycloak_controller.create_realm
      tags:
        - Keycloak
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              anyOf:
                - required: [realm_id]
                - required: [slug]
              properties:
                realm_id:
                  type: string
                  description: Legacy request field for the tenant organization alias
                slug:
                  type: string
                  description: Tenant organization alias
                display_name:
                  type: string
                  description: Legacy request field for the organization display name
                name:
                  type: string
                  description: Optional organization display name
      responses:
        "201":
          description: Organization created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  realm:
                    type: string
                    description: Legacy response field for the tenant alias
                  displayName:
                    type: string
                    description: Legacy response field for the organization display name
                  keycloak_realm_id:
                    type: string
                    description: Legacy response field for the Keycloak organization UUID
                  id:
                    type: string
                    description: Keycloak organization UUID
                  organization_id:
                    type: string
                    description: Keycloak organization UUID
                  alias:
                    type: string
                    description: Tenant organization alias
                  name:
                    type: string
                    description: Tenant organization display name
        "400":
          description: Bad request - tenant alias missing or invalid
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
        "409":
          description: Organization already exists or conflict
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
        "500":
          description: Keycloak or server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string

  /tenant-realms/{realm_id}:
    delete:
      summary: Delete a Keycloak organization and its associated tenant
      description: Removes the organization from the shared realm and then removes the tenant record from Postgres. The path parameter is the tenant alias (legacy realm slug path name).
      operationId: m8flow_backend.routes.keycloak_controller.delete_tenant_realm
      tags:
        - Keycloak
      parameters:
        - name: realm_id
          in: path
          required: true
          schema:
            type: string
          description: The tenant alias of the organization to delete
      responses:
        "200":
          description: Tenant deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "401":
          description: Unauthorized - missing or invalid admin token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Organization not found in Keycloak
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tenants/check:
    get:
      summary: Check if tenant exists by slug or id (unauthenticated)
      description: For pre-login tenant selection. Only considers ACTIVE tenants.
      operationId: m8flow_backend.routes.tenant_controller.check_tenant_exists
      tags:
        - Tenant
      security: []
      parameters:
        - name: identifier
          in: query
          required: true
          schema:
            type: string
          description: Tenant slug or id to look up
      responses:
        "200":
          description: Check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantExistsResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tenants/slug/{slug}:
    get:
      summary: Get tenant by slug
      operationId: m8flow_backend.routes.tenant_controller.get_tenant_by_slug
      tags:
        - Tenant
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Human-readable slug identifier of the tenant
      responses:
        "200":
          description: Tenant retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantResponse"
        "401":
          description: Unauthorized - user not authenticated
        "403":
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tenants:
    get:
      summary: Get all tenants
      operationId: m8flow_backend.routes.tenant_controller.get_all_tenants
      tags:
        - Tenant
      responses:
        "200":
          description: List of all tenants
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantListResponse"
        "401":
          description: Unauthorized - user not authenticated
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tenants/{tenant_id}:
    get:
      summary: Get tenant by ID
      operationId: m8flow_backend.routes.tenant_controller.get_tenant_by_id
      tags:
        - Tenant
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
          description: Unique identifier of the tenant
      responses:
        "200":
          description: Tenant retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantResponse"
        "401":
          description: Unauthorized - user not authenticated
        "403":
          description: Forbidden - insufficient permissions
        "404":
          description: Tenant not found

    put:
      summary: Update tenant display name
      description: Updates the tenant's human-readable name in both the local database and the Keycloak organization. The slug and ID are immutable and cannot be changed.
      operationId: m8flow_backend.routes.keycloak_controller.update_tenant_name
      tags:
        - Tenant
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
          description: Unique identifier (UUID) of the tenant to update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  description: New display name for the tenant
              example:
                name: "Updated Tenant Name"
      responses:
        "200":
          description: Tenant updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Bad request - no fields to update, slug update attempted, tenant is deleted, or invalid status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized - user not authenticated
        "403":
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Tenant not found
        "500":
          description: Internal server error

  /tenants/{tenant_id}/members:
    get:
      summary: List tenant organization members
      description: Lists Keycloak organization members for the selected tenant and returns only tenant-local roles for that organization.
      operationId: m8flow_backend.routes.tenant_role_controller.list_tenant_members
      tags:
        - Tenant
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
          description: Unique tenant identifier
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Optional username prefix filter for organization members
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Zero-based member offset for paginated loading
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Maximum number of tenant members to return in one page
      responses:
        "200":
          description: Tenant members retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantMemberListResponse"
        "401":
          description: Unauthorized - user not authenticated
        "403":
          description: Forbidden - insufficient permissions
        "404":
          description: Tenant or organization not found
        "500":
          description: Internal server error
    post:
      summary: Add tenant organization member
      description: Adds one existing Keycloak user to the selected tenant organization and optionally assigns organization groups.
      operationId: m8flow_backend.routes.tenant_role_controller.create_tenant_member
      tags:
        - Tenant
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
          description: Unique tenant identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantMemberCreateRequest"
      responses:
        "201":
          description: Tenant member created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantMemberCreateResponse"
        "400":
          description: Invalid request body
        "401":
          description: Unauthorized - user not authenticated
        "403":
          description: Forbidden - insufficient permissions
        "404":
          description: Tenant, organization, or requested user not found
        "409":
          description: Local user synchronization conflict
        "500":
          description: Internal server error

  /tenants/{tenant_id}/members/{username}:
    delete:
      summary: Remove tenant organization member
      description: Removes one Keycloak organization member from the selected tenant and clears local tenant-scoped assignments.
      operationId: m8flow_backend.routes.tenant_role_controller.delete_tenant_member
      tags:
        - Tenant
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
          description: Unique tenant identifier
        - name: username
          in: path
          required: true
          schema:
            type: string
          description: Tenant member username
      responses:
        "200":
          description: Tenant member removed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantMemberDeleteResponse"
        "400":
          description: Invalid tenant member data
        "401":
          description: Unauthorized - user not authenticated
        "403":
          description: Forbidden - insufficient permissions
        "404":
          description: Tenant member not found
        "409":
          description: Local user synchronization conflict
        "500":
          description: Internal server error

  /tenants/{tenant_id}/available-users:
    get:
      summary: List existing users available to add to a tenant
      description: Lists existing Keycloak users that are not yet members of the selected tenant organization.
      operationId: m8flow_backend.routes.tenant_role_controller.list_available_tenant_users_for_tenant
      tags:
        - Tenant
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
          description: Unique tenant identifier
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Optional filter by username, display name, or email
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Zero-based available-user offset for paginated loading
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Maximum number of available users to return in one page
      responses:
        "200":
          description: Available users retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantAvailableUserListResponse"
        "401":
          description: Unauthorized - user not authenticated
        "403":
          description: Forbidden - insufficient permissions
        "404":
          description: Tenant or organization not found
        "500":
          description: Internal server error

  /tenants/{tenant_id}/groups:
    get:
      summary: List tenant Keycloak groups
      description: Lists the Keycloak organization groups for the selected tenant, including their members and mapped tenant-scoped roles.
      operationId: m8flow_backend.routes.tenant_role_controller.list_tenant_groups
      tags:
        - Tenant
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
          description: Unique tenant identifier
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Optional filter by group name or mapped role
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Zero-based group offset for paginated loading
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Maximum number of tenant groups to return in one page
      responses:
        "200":
          description: Tenant groups retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantGroupListResponse"
        "401":
          description: Unauthorized - user not authenticated
        "403":
          description: Forbidden - insufficient permissions
        "404":
          description: Tenant or organization not found
        "500":
          description: Internal server error
    post:
      summary: Create tenant Keycloak group
      description: Creates a new top-level Keycloak organization group for the selected tenant.
      operationId: m8flow_backend.routes.tenant_role_controller.create_group
      tags:
        - Tenant
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
          description: Unique tenant identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        "201":
          description: Tenant group created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantGroupCreateResponse"
        "400":
          description: Invalid request body
        "401":
          description: Unauthorized - user not authenticated
        "403":
          description: Forbidden - insufficient permissions
        "404":
          description: Tenant or organization not found
        "409":
          description: Group already exists
        "500":
          description: Internal server error

  /tenants/{tenant_id}/groups/{group_name}:
    put:
      summary: Rename tenant Keycloak group
      description: Renames one top-level Keycloak organization group for the selected tenant while preserving its members and granted tenant-scoped roles.
      operationId: m8flow_backend.routes.tenant_role_controller.update_group
      tags:
        - Tenant
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
          description: Unique tenant identifier
        - name: group_name
          in: path
          required: true
          schema:
            type: string
          description: Current group name to rename
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantGroupUpdateRequest"
      responses:
        "200":
          description: Tenant group renamed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantGroupUpdateResponse"
        "400":
          description: Invalid request body or group name
        "401":
          description: Unauthorized - user not authenticated
        "403":
          description: Forbidden - insufficient permissions
        "404":
          description: Tenant or organization group not found
        "409":
          description: Group already exists or local role sync conflict
        "500":
          description: Internal server error
    delete:
      summary: Delete tenant Keycloak group
      description: Deletes one top-level Keycloak organization group for the selected tenant and mirrors the resulting role changes locally for affected members.
      operationId: m8flow_backend.routes.tenant_role_controller.remove_group
      tags:
        - Tenant
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
          description: Unique tenant identifier
        - name: group_name
          in: path
          required: true
          schema:
            type: string
          description: Group name to delete
      responses:
        "200":
          description: Tenant group removed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantGroupDeleteResponse"
        "400":
          description: Invalid group
        "401":
          description: Unauthorized - user not authenticated
        "403":
          description: Forbidden - insufficient permissions
        "404":
          description: Tenant or organization group not found
        "409":
          description: Local role sync conflict
        "500":
          description: Internal server error

  /tenants/{tenant_id}/groups/{group_name}/members/{username}:
    put:
      summary: Assign tenant member to organization group
      description: Assigns one tenant member to one existing Keycloak organization group and mirrors any mapped tenant-scoped roles locally.
      operationId: m8flow_backend.routes.tenant_role_controller.assign_group_member
      tags:
        - Tenant
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
        - name: group_name
          in: path
          required: true
          schema:
            type: string
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Group membership assigned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantGroupMembershipMutationResponse"
        "400":
          description: Invalid tenant member or group
        "401":
          description: Unauthorized - user not authenticated
        "403":
          description: Forbidden - insufficient permissions
        "404":
          description: Tenant member not found
        "409":
          description: Local user synchronization conflict
        "500":
          description: Internal server error

    delete:
      summary: Remove tenant member from organization group
      description: Removes one tenant member from one existing Keycloak organization group and mirrors any mapped tenant-scoped roles locally.
      operationId: m8flow_backend.routes.tenant_role_controller.remove_group_member
      tags:
        - Tenant
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
        - name: group_name
          in: path
          required: true
          schema:
            type: string
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Group membership removed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantGroupMembershipMutationResponse"
        "400":
          description: Invalid tenant member or group
        "401":
          description: Unauthorized - user not authenticated
        "403":
          description: Forbidden - insufficient permissions
        "404":
          description: Tenant member not found
        "409":
          description: Local user synchronization conflict
        "500":
          description: Internal server error

  /tenants/{tenant_id}/groups/{group_name}/roles/{role_name}:
    put:
      summary: Assign tenant role to organization group
      description: Assigns one tenant-scoped role to one existing Keycloak organization group and mirrors the result locally for all members.
      operationId: m8flow_backend.routes.tenant_role_controller.assign_group_role
      tags:
        - Tenant
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
        - name: group_name
          in: path
          required: true
          schema:
            type: string
        - name: role_name
          in: path
          required: true
          schema:
            type: string
            enum: [tenant-admin, editor, integrator, reviewer, submitter, viewer]
      responses:
        "200":
          description: Group role assigned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantGroupRoleMutationResponse"
        "400":
          description: Invalid group or role
        "401":
          description: Unauthorized - user not authenticated
        "403":
          description: Forbidden - insufficient permissions
        "404":
          description: Tenant or organization group not found
        "409":
          description: Local role sync conflict
        "500":
          description: Internal server error

    delete:
      summary: Remove tenant role from organization group
      description: Removes one tenant-scoped role from one existing Keycloak organization group and mirrors the result locally for all members.
      operationId: m8flow_backend.routes.tenant_role_controller.remove_group_role
      tags:
        - Tenant
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
        - name: group_name
          in: path
          required: true
          schema:
            type: string
        - name: role_name
          in: path
          required: true
          schema:
            type: string
            enum: [tenant-admin, editor, integrator, reviewer, submitter, viewer]
      responses:
        "200":
          description: Group role removed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantGroupRoleMutationResponse"
        "400":
          description: Invalid group or role
        "401":
          description: Unauthorized - user not authenticated
        "403":
          description: Forbidden - insufficient permissions
        "404":
          description: Tenant or organization group not found
        "500":
          description: Internal server error

  /tenants/{tenant_id}/members/{username}/roles/{role_name}:
    put:
      summary: Assign tenant role to organization member
      description: Assigns one tenant-scoped role to one Keycloak organization member and mirrors the assignment locally for immediate RBAC effects.
      operationId: m8flow_backend.routes.tenant_role_controller.assign_member_role
      tags:
        - Tenant
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
        - name: username
          in: path
          required: true
          schema:
            type: string
        - name: role_name
          in: path
          required: true
          schema:
            type: string
            enum: [tenant-admin, editor, integrator, reviewer, viewer]
      responses:
        "200":
          description: Role assigned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantMemberRoleMutationResponse"
        "400":
          description: Invalid tenant role or member data
        "401":
          description: Unauthorized - user not authenticated
        "403":
          description: Forbidden - insufficient permissions
        "404":
          description: Tenant member not found
        "409":
          description: Local role sync conflict
        "500":
          description: Internal server error

    delete:
      summary: Remove tenant role from organization member
      description: Removes one tenant-scoped role from one Keycloak organization member and mirrors the removal locally for immediate RBAC effects.
      operationId: m8flow_backend.routes.tenant_role_controller.remove_member_role
      tags:
        - Tenant
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
        - name: username
          in: path
          required: true
          schema:
            type: string
        - name: role_name
          in: path
          required: true
          schema:
            type: string
            enum: [tenant-admin, editor, integrator, reviewer, viewer]
      responses:
        "200":
          description: Role removed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantMemberRoleMutationResponse"
        "400":
          description: Invalid tenant role or member data
        "401":
          description: Unauthorized - user not authenticated
        "403":
          description: Forbidden - insufficient permissions
        "404":
          description: Tenant member not found
        "500":
          description: Internal server error


  /templates:
    get:
      summary: List templates
      description: Retrieves a list of templates with optional filtering by latest version, category, tag, owner, visibility, and search query
      operationId: m8flow_backend.routes.templates_controller.template_list
      tags:
        - Template
      parameters:
        - name: latest_only
          in: query
          schema:
            type: boolean
          description: Filter to show only the latest version of each template
        - name: category
          in: query
          schema:
            type: string
          description: Filter templates by category
        - name: tag
          in: query
          schema:
            type: string
          description: Filter templates by tag
        - name: owner
          in: query
          schema:
            type: string
          description: Filter templates by owner
        - name: visibility
          in: query
          schema:
            type: string
            enum: [PRIVATE, TENANT, PUBLIC]
          description: Filter templates by visibility level
        - name: search
          in: query
          schema:
            type: string
          description: Search templates by name or description
        - name: template_key
          in: query
          schema:
            type: string
          description: Filter to this template key (returns all versions if latest_only=false)
        - name: published_only
          in: query
          schema:
            type: boolean
          description: When true, return only published templates
        - name: include_deleted
          in: query
          schema:
            type: boolean
          description: When true, include soft-deleted templates in results
        - name: deleted_only
          in: query
          schema:
            type: boolean
          description: When true, return only soft-deleted templates
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [created, name]
          description: Sort results by created date or name
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: Sort order (asc or desc)
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number (1-indexed)
        - name: per_page
          in: query
          schema:
            type: integer
            default: 10
          description: Items per page (max 100)
      responses:
        "200":
          description: List of templates retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateListResponse"
        "401":
          description: Unauthorized - user not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      summary: Create template
      description: Creates a new template using BPMN XML content with metadata provided via X-Template-* headers.
      operationId: m8flow_backend.routes.templates_controller.template_create
      tags:
        - Template
      parameters:
        - name: X-Template-Key
          in: header
          required: true
          schema:
            type: string
          description: Unique key for the template.
        - name: X-Template-Name
          in: header
          required: true
          schema:
            type: string
          description: Human-readable name of the template.
        - name: X-Template-Description
          in: header
          required: false
          schema:
            type: string
          description: Optional description of the template.
        - name: X-Template-Category
          in: header
          required: false
          schema:
            type: string
          description: Optional category for grouping templates.
        - name: X-Template-Tags
          in: header
          required: false
          schema:
            type: string
          description: JSON array string or comma-separated list of tags.
        - name: X-Template-Visibility
          in: header
          required: false
          schema:
            type: string
            enum: [PRIVATE, TENANT, PUBLIC]
          description: Visibility level of the template. Defaults to PRIVATE.
        - name: X-Template-Status
          in: header
          required: false
          schema:
            type: string
          description: Status of the template. Defaults to draft.
        - name: X-Template-Is-Published
          in: header
          required: false
          schema:
            type: string
            enum: ["true", "false"]
          description: Whether the template is published. Defaults to false.
        - name: X-Template-Version
          in: header
          required: false
          schema:
            type: string
          description: Optional explicit version identifier (e.g., V1). If omitted, the next version will be generated automatically.
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: string
              description: BPMN XML content (single file)
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
              description: Multiple files (.bpmn, .json, .dmn, .md). At least one .bpmn required. Metadata via X-Template-* headers.
      responses:
        "201":
          description: Template created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
        "400":
          description: Bad request - missing required fields or invalid data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized - user not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict - template with the same key and version already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /templates/{id}:
    get:
      summary: Get template by ID
      description: Retrieves a specific template by its unique identifier
      operationId: m8flow_backend.routes.templates_controller.template_get_by_id
      tags:
