              schema:
                nullable: true
                allOf:
                  - $ref: "#/components/schemas/ProcessModelTemplateInfo"

  /nats-tokens:
    post:
      summary: Generate a NATS event token
      description: Generates a new unique token for a tenant to use when publishing NATS events. Restricted to tenant-admin, integrator, and super-admin.
      operationId: m8flow_backend.routes.nats_token_controller.generate_token
      tags:
        - NATS
      responses:
        "201":
          description: Token generated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NatsTokenResponse"
        "401":
          description: Unauthorized - user not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /events/m8flow-trigger:
    post:
      summary: Receive an external trigger event
      description: >
        Public webhook endpoint that accepts an external trigger payload, publishes
        a NATS event, and synchronously waits for the process instance to be created.
        Returns the created process instance details. The caller must supply a valid
        tenant API key (generated via POST /api/nats-tokens) in the X-M8FLOW-NATS-API-Key header.
        No Keycloak JWT is required.
      operationId: m8flow_backend.routes.events_controller.m8flow_trigger
      tags:
        - Events
      security: []
      parameters:
        - name: X-M8FLOW-NATS-API-Key
          in: header
          required: true
          schema:
            type: string
          description: >
            A valid tenant API key obtained from POST /api/nats-tokens.
            The key is validated via HMAC-SHA256 against the stored hash.

        - name: X-M8FLOW-Process-Identifier
          in: header
          required: true
          schema:
            type: string
          description: The identifier of the process to trigger.
        - name: X-M8FLOW-Username
          in: header
          required: true
          schema:
            type: string
          description: The username on whose behalf the process is triggered.
        - name: X-M8FLOW-Tenant-Slug
          in: header
          required: true
          schema:
            type: string
          description: The human-readable slug of the tenant.
        - name: X-M8FLOW-Stream-Name
          in: header
          required: true
          schema:
            type: string
          description: The NATS stream name to publish the event to.

      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/M8flowTriggerRequest"
      responses:
        "200":
          description: Event accepted and process instance created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M8flowTriggerResponse"
        "202":
          description: Event published to NATS but no reply received from the consumer within the timeout window. The process instance may still be created asynchronously.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M8flowTriggerResponse"
        "400":
          description: Bad request – missing or malformed body / missing tenant context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized – X-M8FLOW-NATS-API-Key header is absent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden – X-M8FLOW-NATS-API-Key is invalid or revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Event was published and the consumer processed it, but process instance creation failed due to a validation or process model error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/M8flowTriggerResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /external-forms/{reference_id}:
    get:
      summary: Fetch external form context for a secure link (public)
      description: >
        Public endpoint called by the external form mini-app with the reference ID from
        the emailed secure link. Returns the external form URL and task context. The
        "actionable" flag is false when the link is expired, superseded, or already
        submitted. No authentication is required; the unguessable reference ID is the
        credential.
      operationId: m8flow_backend.routes.external_forms_controller.external_form_show
      tags:
        - ExternalForms
      security: []
      parameters:
        - name: reference_id
          in: path
          required: true
          schema:
            type: string
          description: The unique reference ID from the secure link.
      responses:
        "200":
          description: The external form request context.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalFormContextResponse"
        "404":
          description: No external form request exists for this reference ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /external-forms/{reference_id}/submit:
    post:
      summary: Submit external form data and resume the workflow (public)
      description: >
        Public endpoint the external form system calls to submit form data for a
        tracked request. Validates the reference ID, stores the submission, completes
        the tracked user task as the recipient user, and resumes the workflow. Only the
        first valid submission for a task counts; sibling links are superseded.
      operationId: m8flow_backend.routes.external_forms_controller.external_form_submit
      tags:
        - ExternalForms
      security: []
      parameters:
        - name: reference_id
          in: path
          required: true
          schema:
            type: string
          description: The unique reference ID from the secure link.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExternalFormSubmitRequest"
      responses:
        "200":
          description: Submission accepted; the workflow has continued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalFormSubmitResponse"
        "400":
          description: The tracked task is not in a state that allows submission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No external form request exists for this reference ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: This form was already submitted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "410":
          description: The link is expired or was superseded by another recipient's submission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: The submission was stored but the workflow could not be resumed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /connectors-grouped:
    get:
      operationId: m8flow_backend.routes.connectors_controller.connectors_grouped
      summary: Returns service-task operations grouped by connector with metadata
      tags:
        - Connectors
      responses:
        "200":
          description: Grouped connector list with metadata
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        ok:
          type: boolean
          example: true
        healthy:
          type: boolean
          example: true

    CreateTenantRequest:
      type: object
      required:
        - name
        - slug
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string

    Tenant:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        modifiedAt:
          type: string
          format: date-time
        createdBy:
          type: string
        modifiedBy:
          type: string

    TenantResponse:
      $ref: "#/components/schemas/Tenant"

    TenantListResponse:
      type: array
      items:
        $ref: "#/components/schemas/Tenant"

    TenantMember:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
          nullable: true
        display_name:
          type: string
          nullable: true
        roles:
          type: array
          items:
            type: string
            enum: [tenant-admin, editor, integrator, reviewer, viewer]
        groups:
          type: array
          items:
            $ref: "#/components/schemas/TenantMemberGroup"

    TenantMemberListResponse:
      type: object
      properties:
        tenant_id:
          type: string
        search:
          type: string
        offset:
          type: integer
        limit:
          type: integer
        has_more:
          type: boolean
        members:
          type: array
          items:
            $ref: "#/components/schemas/TenantMember"

    TenantAvailableUserListResponse:
      type: object
      properties:
        tenant_id:
          type: string
        search:
          type: string
        offset:
          type: integer
        limit:
          type: integer
        has_more:
          type: boolean
        users:
          type: array
          items:
            $ref: "#/components/schemas/TenantGroupMember"

    TenantMemberCreateRequest:
      type: object
      required:
        - username
      properties:
        username:
          type: string
        group_names:
          type: array
          items:
            type: string

    TenantMemberCreateResponse:
      type: object
      properties:
        tenant_id:
          type: string
        group_names:
          type: array
          items:
            type: string
        member:
          $ref: "#/components/schemas/TenantMember"

    TenantMemberDeleteResponse:
      type: object
      properties:
        tenant_id:
          type: string
        username:
          type: string

    TenantMemberRoleMutationResponse:
      type: object
      properties:
        tenant_id:
          type: string
        username:
          type: string
        role_name:
          type: string
        member:
          $ref: "#/components/schemas/TenantMember"

    TenantGroupRoleMutationResponse:
      type: object
      properties:
        tenant_id:
          type: string
        group_name:
          type: string
        role_name:
          type: string
        group:
          $ref: "#/components/schemas/TenantGroup"

    TenantGroupMembershipMutationResponse:
      type: object
      properties:
        tenant_id:
          type: string
        group_name:
          type: string
        username:
          type: string
        member:
          $ref: "#/components/schemas/TenantMember"

    TenantGroupCreateResponse:
      type: object
      properties:
        tenant_id:
          type: string
        group:
          $ref: "#/components/schemas/TenantGroup"

    TenantGroupUpdateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string

    TenantGroupUpdateResponse:
      type: object
      properties:
        tenant_id:
          type: string
        previous_group_name:
          type: string
        group:
          $ref: "#/components/schemas/TenantGroup"

    TenantGroupDeleteResponse:
      type: object
      properties:
        tenant_id:
          type: string
        group_name:
          type: string

    TenantGroupMember:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
          nullable: true
        display_name:
          type: string
          nullable: true

    TenantMemberGroup:
      type: object
      properties:
        id:
          type: string
        name:
          type: string

    TenantGroup:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        path:
          type: string
          nullable: true
        mapped_roles:
          type: array
          items:
            type: string
            enum: [tenant-admin, editor, integrator, reviewer, submitter, viewer]
        member_count:
          type: integer
        members:
          type: array
          items:
            $ref: "#/components/schemas/TenantGroupMember"

    TenantGroupListResponse:
      type: object
      properties:
        tenant_id:
          type: string
        search:
          type: string
        offset:
          type: integer
        limit:
          type: integer
        has_more:
          type: boolean
        groups:
          type: array
          items:
            $ref: "#/components/schemas/TenantGroup"

    TenantExistsResponse:
      type: object
      required:
        - exists
      properties:
        exists:
          type: boolean
          description: Whether an active tenant with the given slug or id exists
        tenant_id:
          type: string
          description: Canonical tenant id when exists is true (for storage/headers)

    TenantActionData:
      type: object
      properties:
        message:
          type: string
        tenant:
          $ref: "#/components/schemas/Tenant"

    TenantActionResponse:
      $ref: "#/components/schemas/TenantActionData"

    Template:
      type: object
      properties:
        id:
          type: integer
        templateKey:
          type: string
        version:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string
        category:
          type: string
        tenantId:
          type: string
        visibility:
          type: string
          enum: [PRIVATE, TENANT, PUBLIC]
        files:
          type: array
          items:
            type: object
            properties:
              fileType:
                type: string
                enum: [bpmn, json, dmn, md]
              fileName:
                type: string
        isPublished:
          type: boolean
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
        updatedAt:
          type: string
          format: date-time
        modifiedBy:
          type: string
        bpmnContent:
          type: string
        is_deleted:
          type: boolean

    TemplateListResponse:
      type: array
      items:
        $ref: "#/components/schemas/Template"

    TemplateCreateRequest:
      type: object
      required:
        - template_key
        - name
      properties:
        template_key:
          type: string
        name:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        category:
          type: string
        visibility:
          type: string
          enum: [PRIVATE, TENANT, PUBLIC]
        status:
          type: string
        is_published:
          type: boolean
        version:
          type: string

    TemplateUpdateRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        category:
          type: string
        visibility:
          type: string
          enum: [PRIVATE, TENANT, PUBLIC]
        status:
          type: string

    MessageData:
      type: object
      properties:
        message:
          type: string

    MessageResponse:
      $ref: "#/components/schemas/MessageData"

    ErrorData:
      type: object
      properties:
        error_code:
          type: string
        message:
          type: string

    ErrorResponse:
      $ref: "#/components/schemas/ErrorData"

    CreateProcessModelFromTemplateRequest:
      type: object
      required:
        - process_group_id
        - process_model_id
        - display_name
      properties:
        process_group_id:
          type: string
          description: The process group where the model will be created
        process_model_id:
          type: string
          description: The ID for the new process model (just the model name, not full path)
        display_name:
          type: string
          description: Display name for the new process model
        description:
          type: string
          description: Optional description for the new process model

    ProcessModelTemplateInfo:
      type: object
      properties:
        id:
          type: integer
        process_model_identifier:
          type: string
        source_template_id:
          type: integer
        source_template_key:
          type: string
        source_template_version:
          type: string
        source_template_name:
          type: string
        m8f_tenant_id:
          type: string
        created_by:
          type: string
        created_at_in_seconds:
          type: integer
        updated_at_in_seconds:
          type: integer

    CreateProcessModelFromTemplateResponse:
      type: object
      properties:
        process_model:
          type: object
          description: The created process model info
        template_info:
          $ref: "#/components/schemas/ProcessModelTemplateInfo"
    NatsTokenResponse:
      type: object
      properties:
        token:
          type: string
          description: The generated token (key)
        tenantId:
          type: string
        createdAtInSeconds:
          type: integer
        createdBy:
          type: string
        updatedAtInSeconds:
          type: integer
        modifiedBy:
          type: string

    ExternalFormContextResponse:
      type: object
      properties:
        reference_id:
          type: string
        status:
          type: string
          description: pending | notified | submitted | completed | failed | expired | superseded
        actionable:
          type: boolean
          description: True when the link can still be used to submit the form.
        external_form_url:
          type: string
        process_instance_id:
          type: integer
        expires_at_in_seconds:
          type: integer
          nullable: true
        task_name:
          type: string
          nullable: true
        task_title:
          type: string
          nullable: true
        process_model_display_name:
          type: string
          nullable: true

    ExternalFormSubmitRequest:
      type: object
      properties:
        data:
          type: object
          additionalProperties: true
          description: The submitted form data, made available to the workflow as task data.

    ExternalFormSubmitResponse:
      type: object
      properties:
        ok:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            reference_id:
              type: string
            status:
              type: string
            process_instance_id:
              type: integer

    M8flowTriggerRequest:
      type: object

      properties:
        data:
          description: >
            Arbitrary caller-supplied payload. Can be any JSON value
            (object, array, string, number, or boolean).
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
            - type: string
            - type: number
            - type: boolean

    M8flowTriggerResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        message:
          type: string
          example: "Event received."
        data:
          type: object
          description: Detailed response data including tenant context, event echo, and process instance details
          properties:
            tenant_id:
              type: string
              description: Resolved tenant identifier for the request
            tenant_slug:
              type: string
              description: Tenant slug from the request header
            process_identifier:
              type: string
              description: The process identifier from the request header
            username:
              type: string
              description: The username from the request header
            event:
              type: object
              additionalProperties: true
              description: Echo of the published event data (excluding internal fields)
            error:
              type: string
              description: Error message if process instance creation failed (present on 422 responses)
            process_instance:
              description: Process instance details if created successfully, null otherwise
              type: object
              additionalProperties: true
              nullable: true
