name: m8flow

services:
  m8flow-db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_HOST_PORT:-6843}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  keycloak-db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME:-keycloak}
      POSTGRES_USER: ${KEYCLOAK_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER:-keycloak} -d ${KEYCLOAK_DB_NAME:-keycloak}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data

  keycloak:
    build:
      context: ..
      dockerfile: docker/m8flow.keycloak.Dockerfile
    image: m8flow-keycloak
    pull_policy: never
    command: ["start-dev", "--import-realm", "--features=organization,token-exchange,admin-fine-grained-authz", "--spi-theme-static-max-age=-1", "--spi-theme-cache-themes=false", "--spi-theme-cache-templates=false"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      KC_HTTP_PORT: ${KC_HTTP_PORT:-8080}
      KC_HOSTNAME_STRICT: ${KC_HOSTNAME_STRICT:-false}
      KC_PROXY_HEADERS: ${KC_PROXY_HEADERS:-xforwarded}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME_HOST:-localhost}
      KC_HOSTNAME_URL: ${KEYCLOAK_HOSTNAME:-http://localhost:6842}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-m8flow}
      M8FLOW_KEYCLOAK_SHARED_REALM: ${M8FLOW_KEYCLOAK_SHARED_REALM:-m8flow}
      M8FLOW_KEYCLOAK_MASTER_REALM: ${M8FLOW_KEYCLOAK_MASTER_REALM:-master}
      M8FLOW_KEYCLOAK_DEFAULT_ORGANIZATION_ALIAS: "${M8FLOW_KEYCLOAK_DEFAULT_ORGANIZATION_ALIAS:-}"
      M8FLOW_KEYCLOAK_DEFAULT_ORGANIZATION_NAME: "${M8FLOW_KEYCLOAK_DEFAULT_ORGANIZATION_NAME:-}"
      KEYCLOAK_SUPER_ADMIN_USER: ${KEYCLOAK_SUPER_ADMIN_USER:-super-admin}
      KEYCLOAK_SUPER_ADMIN_PASSWORD: ${KEYCLOAK_SUPER_ADMIN_PASSWORD:-super-admin}
      M8FLOW_KEYCLOAK_SPOKE_CLIENT_ID: ${M8FLOW_KEYCLOAK_SPOKE_CLIENT_ID:-m8flow-backend}
      M8FLOW_KEYCLOAK_SPOKE_CLIENT_SECRET: "${M8FLOW_KEYCLOAK_SPOKE_CLIENT_SECRET:-}"
      M8FLOW_KEYCLOAK_MASTER_CLIENT_SECRET: "${M8FLOW_KEYCLOAK_MASTER_CLIENT_SECRET:-}"
      SPIFFWORKFLOW_BACKEND_URL: "${SPIFFWORKFLOW_BACKEND_URL:-}"
      M8FLOW_BACKEND_URL: "${M8FLOW_BACKEND_URL:-http://localhost:6840}"
      SPIFFWORKFLOW_BACKEND_URL_FOR_FRONTEND: "${SPIFFWORKFLOW_BACKEND_URL_FOR_FRONTEND:-}"
      M8FLOW_BACKEND_URL_FOR_FRONTEND: "${M8FLOW_BACKEND_URL_FOR_FRONTEND:-http://localhost:6841}"
    ports:
      - "${KEYCLOAK_MGMT_PORT:-6849}:9000"
    healthcheck:
      test: ["CMD-SHELL", "/opt/keycloak/bin/kcadm.sh config credentials --server \"http://127.0.0.1:$${KC_HTTP_PORT:-8080}$${KC_HTTP_RELATIVE_PATH:-}\" --realm master --user \"$${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}\" --password \"$${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin}\" >/dev/null 2>&1"]
      # start_period covers Keycloak's slow first boot (JVM cold start + realm import +
      # post-start realm configuration). Failing checks during this window do not count
      # toward retries, so dependents won't see "container is unhealthy" on a slow machine.
      start_period: 180s
      interval: 10s
      timeout: 10s
      retries: 12
    depends_on:
      keycloak-db:
        condition: service_healthy

  keycloak-proxy:
    image: nginx:alpine
    ports:
      - "${KEYCLOAK_PROXY_PORT:-6842}:6842"
    volumes:
      - ./nginx-keycloak-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - keycloak
  keycloak-master-admin-init:
    image: m8flow-keycloak
    pull_policy: never
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_SUPER_ADMIN_USER: ${KEYCLOAK_SUPER_ADMIN_USER:-super-admin}
      KEYCLOAK_SUPER_ADMIN_PASSWORD: ${KEYCLOAK_SUPER_ADMIN_PASSWORD:-super-admin}
      KC_HTTP_PORT: ${KC_HTTP_PORT:-8080}
      KEYCLOAK_INTERNAL_URL: "${KEYCLOAK_INTERNAL_URL:-}"
      M8FLOW_KEYCLOAK_SHARED_REALM: ${M8FLOW_KEYCLOAK_SHARED_REALM:-m8flow}
      M8FLOW_KEYCLOAK_MASTER_REALM: ${M8FLOW_KEYCLOAK_MASTER_REALM:-master}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-m8flow}
      M8FLOW_KEYCLOAK_SPOKE_CLIENT_ID: ${M8FLOW_KEYCLOAK_SPOKE_CLIENT_ID:-m8flow-backend}
      M8FLOW_KEYCLOAK_SPOKE_CLIENT_SECRET: "${M8FLOW_KEYCLOAK_SPOKE_CLIENT_SECRET:-}"
      M8FLOW_KEYCLOAK_MASTER_CLIENT_SECRET: "${M8FLOW_KEYCLOAK_MASTER_CLIENT_SECRET:-}"
      SPIFFWORKFLOW_BACKEND_URL: "${SPIFFWORKFLOW_BACKEND_URL:-}"
      M8FLOW_BACKEND_URL: "${M8FLOW_BACKEND_URL:-http://localhost:6840}"
      SPIFFWORKFLOW_BACKEND_URL_FOR_FRONTEND: "${SPIFFWORKFLOW_BACKEND_URL_FOR_FRONTEND:-}"
      M8FLOW_BACKEND_URL_FOR_FRONTEND: "${M8FLOW_BACKEND_URL_FOR_FRONTEND:-http://localhost:6841}"
    depends_on:
      keycloak:
        condition: service_healthy
    volumes:
      - ../m8flow-backend/bin/ensure_keycloak_master_super_admin.sh:/ensure_keycloak_master_super_admin.sh:ro
    entrypoint: ["/bin/sh", "/ensure_keycloak_master_super_admin.sh"]
    restart: "no"

  redis:
    image: redis:6-alpine
    command: ["redis-server", "--save", "20", "1", "--loglevel", "warning"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "${REDIS_HOST_PORT:-6848}:6379"
    volumes:
      - redis-data:/data

  m8flow-nats-consumer:
    profiles: ["nats"]
    container_name: m8flow-nats-consumer
    image: m8flow-backend
    pull_policy: never
    user: "0"
    command:
      - "sh"
      - "-c"
      - |
        if [ "$$M8FLOW_NATS_ENABLED" = "true" ]; then
          PYTHONPATH=/app:/app/m8flow-backend/src:/app/spiffworkflow-backend/src \
          exec python m8flow-nats-consumer/consumer.py
        else
          echo "M8FLOW_NATS_ENABLED is not true. Consumer idling."
          exec tail -f /dev/null
        fi
    env_file: ../.env
    depends_on:
      m8flow-backend:
        condition: service_started
    environment:
      M8FLOW_NATS_URL: "nats://${M8FLOW_NATS_USER:-admin}:${M8FLOW_NATS_PASSWORD:-admin}@nats:4222"
      M8FLOW_BACKEND_DATABASE_URI: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@m8flow-db:5432/${POSTGRES_DB:-postgres}"
      SPIFFWORKFLOW_BACKEND_DATABASE_URI: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@m8flow-db:5432/${POSTGRES_DB:-postgres}"
      M8FLOW_BACKEND_UPGRADE_DB: "false"
      M8FLOW_BACKEND_SW_UPGRADE_DB: "false"
      M8FLOW_BACKEND_BPMN_SPEC_ABSOLUTE_DIR: "/data/process_models"
    volumes:
      - type: bind
        source: ../data/process_models
        target: /data/process_models
      - ../data/m8flow_nats_consumer:/data/m8flow_nats_consumer
    restart: unless-stopped

  m8flow-notification-worker:
    profiles: ["nats"]
    container_name: m8flow-notification-worker
    image: m8flow-backend
    pull_policy: never
    user: "0"
    command:
      - "sh"
      - "-c"
      - |
        if [ "$$M8FLOW_NATS_ENABLED" = "true" ]; then
          PYTHONPATH=/app:/app/m8flow-backend/src:/app/spiffworkflow-backend/src \
          exec python m8flow-nats-consumer/notification_worker.py
        else
          echo "M8FLOW_NATS_ENABLED is not true. Notification worker idling."
          exec tail -f /dev/null
        fi
    env_file: ../.env
    depends_on:
      m8flow-backend:
        condition: service_started
    environment:
      M8FLOW_NATS_URL: "nats://${M8FLOW_NATS_USER:-admin}:${M8FLOW_NATS_PASSWORD:-admin}@nats:4222"
      M8FLOW_BACKEND_DATABASE_URI: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@m8flow-db:5432/${POSTGRES_DB:-postgres}"
      SPIFFWORKFLOW_BACKEND_DATABASE_URI: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@m8flow-db:5432/${POSTGRES_DB:-postgres}"
      M8FLOW_BACKEND_UPGRADE_DB: "false"
      M8FLOW_BACKEND_SW_UPGRADE_DB: "false"
      M8FLOW_BACKEND_BPMN_SPEC_ABSOLUTE_DIR: "/data/process_models"
      # SMTP is resolved per-tenant from encrypted tenant secrets, not from env.
      # For local testing, set a tenant's SMTP_HOST=mailpit / SMTP_PORT=1025 secrets.
    volumes:
      - type: bind
        source: ../data/process_models
        target: /data/process_models
    restart: unless-stopped

  mailpit:
    profiles: ["nats"]
    container_name: m8flow-mailpit
    image: axllent/mailpit:v1.21
    ports:
      - "${M8FLOW_MAILPIT_UI_PORT:-6853}:8025"
      - "${M8FLOW_MAILPIT_SMTP_PORT:-6854}:1025"
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-6846}:9000"
      - "${MINIO_CONSOLE_PORT:-6847}:9001"
    volumes:
      - minio_data:/data

  minio-mc-init:
    profiles: ["init"]
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "/minio_mc_init.sh"]
    volumes:
      - ./minio_mc_init.sh:/minio_mc_init.sh:ro
    restart: "no"

  process-models-sync:
    profiles: ["init"]
    image: rclone/rclone:1.66.0
    depends_on:
      - minio-mc-init
    volumes:
      - type: bind
        source: ../data/process_models
        target: /cache
      - ../rclone.conf:/config/rclone/rclone.conf:ro
      - ../m8flow-backend/bin/process_models_sync.sh:/process_models_sync.sh:ro
    entrypoint: ["/bin/sh", "/process_models_sync.sh"]
    restart: "no"

  templates-sync:
    profiles: ["init"]
    image: rclone/rclone:1.66.0
    depends_on:
      - minio-mc-init
    volumes:
      - templates_cache:/cache
      - ../rclone.conf:/config/rclone/rclone.conf:ro
      - ../m8flow-backend/bin/templates_sync.sh:/templates_sync.sh:ro
    entrypoint: ["/bin/sh", "/templates_sync.sh"]
    restart: "no"

  fetch-upstream:
    # Clones upstream folders (tag read from upstream.sources.json) into the
    # host working tree. Required for local dev; Docker builds self-fetch.
    profiles: ["init"]
    image: alpine:3.20
    working_dir: /workspace
    entrypoint:
      - /bin/sh
      - -c
      - "apk add --no-cache git bash jq > /dev/null && /workspace/bin/fetch-upstream.sh"
    volumes:
      - type: bind
        source: ..
        target: /workspace
    restart: "no"

  smtp-attachments-sync:
    profiles: ["init"]
    image: alpine:3.20
    entrypoint:
      - /bin/sh
      - /smtp_attachments_sync.sh
      - ${M8FLOW_CONNECTOR_SMTP_ATTACHMENTS_USER_ACCESS_DIR:-/app/data/email_attachments}
    volumes:
      - smtp_attachments:${M8FLOW_CONNECTOR_SMTP_ATTACHMENTS_USER_ACCESS_DIR:-/app/data/email_attachments}
      - ${M8FLOW_CONNECTOR_SMTP_ATTACHMENTS_DIR:-../data/email_attachments}:/host_attachments:ro
      - ../m8flow-backend/bin/smtp_attachments_sync.sh:/smtp_attachments_sync.sh:ro
    restart: "no"

  slack-attachments-sync:
    profiles: ["init"]
    image: alpine:3.20
    entrypoint:
      - /bin/sh
      - /slack_attachments_sync.sh
      - ${M8FLOW_CONNECTOR_SLACK_ATTACHMENTS_USER_ACCESS_DIR:-/app/data/slack_attachments}
    volumes:
      - slack_attachments:${M8FLOW_CONNECTOR_SLACK_ATTACHMENTS_USER_ACCESS_DIR:-/app/data/slack_attachments}
      - ${M8FLOW_CONNECTOR_SLACK_ATTACHMENTS_DIR:-../data/slack_attachments}:/host_attachments:ro
      - ../m8flow-backend/bin/slack_attachments_sync.sh:/slack_attachments_sync.sh:ro
    restart: "no"

  # -------------------------
  # APP SERVICES
  # -------------------------

  m8flow-backend:
    image: m8flow-backend
    pull_policy: never
    build:
      context: ..
      dockerfile: docker/m8flow.backend.Dockerfile
      args:
        UPSTREAM_TAG: ${UPSTREAM_TAG:-}
    user: "0"
    env_file: ../.env
    environment:
      M8FLOW_BACKEND_BPMN_SPEC_ABSOLUTE_DIR: "${M8FLOW_BACKEND_BPMN_SPEC_ABSOLUTE_DIR:-/app/data/process_models}"
      M8FLOW_BACKEND_DATABASE_URI: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@m8flow-db:5432/${POSTGRES_DB:-postgres}"
      M8FLOW_BACKEND_UPGRADE_DB: "${M8FLOW_BACKEND_UPGRADE_DB:-true}"
      M8FLOW_BACKEND_CONNECTOR_PROXY_URL: "http://m8flow-connector-proxy:${CONNECTOR_PROXY_PORT:-6844}"
      KEYCLOAK_URL: "http://keycloak-proxy:6842"
      M8FLOW_KEYCLOAK_URL: "http://keycloak-proxy:6842"
      KEYCLOAK_HOSTNAME: "${KEYCLOAK_HOSTNAME:-http://localhost:6842}"
      SPIFFWORKFLOW_BACKEND_AUTH_CONFIGS__0__uri: "${KEYCLOAK_HOSTNAME:-http://localhost:6842}/realms/${M8FLOW_KEYCLOAK_SHARED_REALM:-m8flow}"
      SPIFFWORKFLOW_BACKEND_AUTH_CONFIGS__0__internal_uri: "http://keycloak-proxy:6842/realms/${M8FLOW_KEYCLOAK_SHARED_REALM:-m8flow}"
      SPIFFWORKFLOW_BACKEND_AUTH_CONFIGS__1__uri: "${KEYCLOAK_HOSTNAME:-http://localhost:6842}/realms/${M8FLOW_KEYCLOAK_MASTER_REALM:-master}"
      SPIFFWORKFLOW_BACKEND_AUTH_CONFIGS__1__internal_uri: "http://keycloak-proxy:6842/realms/${M8FLOW_KEYCLOAK_MASTER_REALM:-master}"
      SPIFFWORKFLOW_BACKEND_URL: "${SPIFFWORKFLOW_BACKEND_URL:-http://localhost:6840}"
      M8FLOW_BACKEND_URL_FOR_FRONTEND: "${M8FLOW_BACKEND_URL_FOR_FRONTEND:-http://localhost:6841}"
      M8FLOW_BACKEND_CELERY_BROKER_URL: "${M8FLOW_BACKEND_CELERY_BROKER_URL:-redis://redis:6379/0}"
      M8FLOW_BACKEND_CELERY_RESULT_BACKEND: "${M8FLOW_BACKEND_CELERY_RESULT_BACKEND:-redis://redis:6379/0}"

      M8FLOW_NATS_URL: "nats://${M8FLOW_NATS_USER:-admin}:${M8FLOW_NATS_PASSWORD:-admin}@nats:4222"
    ports:
      - "${M8FLOW_BACKEND_PORT:-6840}:${M8FLOW_BACKEND_PORT:-6840}"
    volumes:
      - type: bind
        source: ../data/process_models
        target: /app/data/process_models
      - templates_cache:/app/data/templates
    depends_on:
      m8flow-db:
        condition: service_healthy
      keycloak-proxy:
        condition: service_started
      keycloak:
        condition: service_healthy
      keycloak-master-admin-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  m8flow-celery-worker:
    image: m8flow-backend
    pull_policy: never
    user: "0"
    command: ["bash", "./m8flow-backend/bin/run_m8flow_celery_worker.sh"]
    env_file: ../.env
    environment:
      M8FLOW_BACKEND_BPMN_SPEC_ABSOLUTE_DIR: "${M8FLOW_BACKEND_BPMN_SPEC_ABSOLUTE_DIR:-/data/process_models}"
      M8FLOW_BACKEND_DATABASE_URI: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@m8flow-db:5432/${POSTGRES_DB:-postgres}"
      M8FLOW_BACKEND_CONNECTOR_PROXY_URL: "http://m8flow-connector-proxy:${CONNECTOR_PROXY_PORT:-6844}"
      KEYCLOAK_URL: "http://keycloak-proxy:6842"
      M8FLOW_KEYCLOAK_URL: "http://keycloak-proxy:6842"
      KEYCLOAK_HOSTNAME: "${KEYCLOAK_HOSTNAME:-http://localhost:6842}"
      SPIFFWORKFLOW_BACKEND_AUTH_CONFIGS__0__uri: "${KEYCLOAK_HOSTNAME:-http://localhost:6842}/realms/${M8FLOW_KEYCLOAK_SHARED_REALM:-m8flow}"
      SPIFFWORKFLOW_BACKEND_AUTH_CONFIGS__0__internal_uri: "http://keycloak-proxy:6842/realms/${M8FLOW_KEYCLOAK_SHARED_REALM:-m8flow}"
      SPIFFWORKFLOW_BACKEND_AUTH_CONFIGS__1__uri: "${KEYCLOAK_HOSTNAME:-http://localhost:6842}/realms/${M8FLOW_KEYCLOAK_MASTER_REALM:-master}"
      SPIFFWORKFLOW_BACKEND_AUTH_CONFIGS__1__internal_uri: "http://keycloak-proxy:6842/realms/${M8FLOW_KEYCLOAK_MASTER_REALM:-master}"
      M8FLOW_BACKEND_CELERY_BROKER_URL: "${M8FLOW_BACKEND_CELERY_BROKER_URL:-redis://redis:6379/0}"
      M8FLOW_BACKEND_CELERY_RESULT_BACKEND: "${M8FLOW_BACKEND_CELERY_RESULT_BACKEND:-redis://redis:6379/0}"
      M8FLOW_BACKEND_RUNNING_IN_CELERY_WORKER: "true"
      M8FLOW_BACKEND_RUN_BACKGROUND_SCHEDULER_IN_CREATE_APP: "false"
      M8FLOW_BACKEND_UPGRADE_DB: "false"
      M8FLOW_BACKEND_SW_UPGRADE_DB: "false"
    volumes:
      - type: bind
        source: ../data/process_models
        target: /data/process_models
    depends_on:
      m8flow-db:
        condition: service_started
      keycloak:
        condition: service_started
      keycloak-master-admin-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  m8flow-celery-flower:
    image: m8flow-backend
    pull_policy: never
    user: "0"
    command: ["bash", "./m8flow-backend/bin/run_m8flow_celery_worker.sh", "flower"]
    env_file: ../.env
    environment:
      M8FLOW_BACKEND_BPMN_SPEC_ABSOLUTE_DIR: "${M8FLOW_BACKEND_BPMN_SPEC_ABSOLUTE_DIR:-/data/process_models}"
      M8FLOW_BACKEND_DATABASE_URI: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@m8flow-db:5432/${POSTGRES_DB:-postgres}"
      KEYCLOAK_URL: "http://keycloak-proxy:6842"
      M8FLOW_KEYCLOAK_URL: "http://keycloak-proxy:6842"
      KEYCLOAK_HOSTNAME: "${KEYCLOAK_HOSTNAME:-http://localhost:6842}"
      SPIFFWORKFLOW_BACKEND_AUTH_CONFIGS__0__uri: "${KEYCLOAK_HOSTNAME:-http://localhost:6842}/realms/${M8FLOW_KEYCLOAK_SHARED_REALM:-m8flow}"
      SPIFFWORKFLOW_BACKEND_AUTH_CONFIGS__0__internal_uri: "http://keycloak-proxy:6842/realms/${M8FLOW_KEYCLOAK_SHARED_REALM:-m8flow}"
      SPIFFWORKFLOW_BACKEND_AUTH_CONFIGS__1__uri: "${KEYCLOAK_HOSTNAME:-http://localhost:6842}/realms/${M8FLOW_KEYCLOAK_MASTER_REALM:-master}"
      SPIFFWORKFLOW_BACKEND_AUTH_CONFIGS__1__internal_uri: "http://keycloak-proxy:6842/realms/${M8FLOW_KEYCLOAK_MASTER_REALM:-master}"
      M8FLOW_BACKEND_CELERY_BROKER_URL: "${M8FLOW_BACKEND_CELERY_BROKER_URL:-redis://redis:6379/0}"
      M8FLOW_BACKEND_CELERY_RESULT_BACKEND: "${M8FLOW_BACKEND_CELERY_RESULT_BACKEND:-redis://redis:6379/0}"
      M8FLOW_BACKEND_RUNNING_IN_CELERY_WORKER: "false"
      M8FLOW_BACKEND_RUN_BACKGROUND_SCHEDULER_IN_CREATE_APP: "false"
      M8FLOW_BACKEND_UPGRADE_DB: "false"
      M8FLOW_BACKEND_SW_UPGRADE_DB: "false"
    ports:
      - "${M8FLOW_BACKEND_CELERY_FLOWER_PORT:-6850}:${M8FLOW_BACKEND_CELERY_FLOWER_PORT:-6850}"
    volumes:
      - type: bind
        source: ../data/process_models
        target: /data/process_models
    depends_on:
      m8flow-db:
        condition: service_started
      keycloak:
        condition: service_started
      keycloak-master-admin-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  m8flow-frontend:
    build:
      context: ..
      dockerfile: docker/m8flow.frontend.Dockerfile
      args:
        UPSTREAM_TAG: ${UPSTREAM_TAG:-}
    env_file: ../.env
    environment:
      M8FLOW_FRONTEND_INTERNAL_PORT: "8080"
      BACKEND_BASE_URL: "${M8FLOW_FRONTEND_BACKEND_BASE_URL:-http://localhost:6840}"
      M8FLOW_KEYCLOAK_SHARED_REALM: "${M8FLOW_KEYCLOAK_SHARED_REALM:-m8flow}"
      M8FLOW_KEYCLOAK_MASTER_REALM: "${M8FLOW_KEYCLOAK_MASTER_REALM:-master}"
    ports:
      - "${M8FLOW_FRONTEND_PORT:-6841}:8080"
    depends_on:
      - m8flow-backend

  m8flow-connector-proxy:
    container_name: m8flow-connector-proxy
    image: m8flow/m8flow-connector-proxy
    build:
      context: ../m8flow-connector-proxy
    env_file: ../.env
    ports:
      - "${CONNECTOR_PROXY_PORT:-6844}:${CONNECTOR_PROXY_PORT:-6844}/tcp"
    volumes:
      - type: volume
        source: "smtp_attachments"
        target: "${M8FLOW_CONNECTOR_SMTP_ATTACHMENTS_USER_ACCESS_DIR:-/app/data/email_attachments}"
        read_only: true
      - type: volume
        source: "slack_attachments"
        target: "${M8FLOW_CONNECTOR_SLACK_ATTACHMENTS_USER_ACCESS_DIR:-/app/data/slack_attachments}"
        read_only: true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:${CONNECTOR_PROXY_PORT:-6844}/liveness || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  db-data:
    driver: local
  keycloak-db-data:
    driver: local
  redis-data:
    driver: local
  templates_cache:
    driver: local
  minio_data:
    driver: local
  smtp_attachments:
    driver: local
  slack_attachments:
    driver: local
