name: m8flow

services:
  m8flow-db:
    image: postgres:15
    env_file: ../.env
    ports:
      - "1111:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  keycloak-db:
    image: postgres:15
    env_file: ../.env
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME:-keycloak}
      POSTGRES_USER: ${KEYCLOAK_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data

  keycloak:
    build:
      context: ..
      dockerfile: docker/m8flow.keycloak.Dockerfile
    env_file: ../.env
    command: ["start-dev"]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      KC_HTTP_PORT: ${KC_HTTP_PORT:-8080}
      KC_HOSTNAME_STRICT: ${KC_HOSTNAME_STRICT:-false}
      KC_HOSTNAME_STRICT_HTTPS: "false"
    ports:
      - "7002:8080"
    depends_on:
      - keycloak-db

  redis:
    image: redis:6-alpine
    command: ["redis-server", "--save", "20", "1", "--loglevel", "warning"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  nats:
    container_name: m8flow-nats
    image: nats:2.10-alpine
    command: ["-js", "--store_dir=/data/nats", "-m", "8222"]
    ports:
      - "${M8FLOW_NATS_PORT:-4222}:4222/tcp" # client
      - "8222:8222/tcp" # monitoring HTTP (optional)
    volumes:
      - nats_data:/data/nats
    healthcheck:
      test: "wget -qO- http://localhost:8222/healthz || exit 1"
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  m8flow-nats-consumer:
    container_name: m8flow-nats-consumer
    build:
      context: ..
      dockerfile: docker/m8flow.backend.Dockerfile
    command:
      - "sh"
      - "-c"
      - |
        uv pip install --system nats-py httpx python-dotenv &&
        PYTHONPATH=/app:/app/extensions/m8flow-backend/src:/app/spiffworkflow-backend/src \
        exec python m8flow-nats-consumer/consumer.py
    env_file: ../.env
    depends_on:
      nats:
        condition: service_healthy
      m8flow-backend:
        condition: service_started
    environment:
      M8FLOW_NATS_URL: "nats://nats:4222"
    volumes:
      - ../process_models:/app/process_models
      - ../m8flow-nats-consumer:/app/m8flow-nats-consumer
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # -------------------------
  # INIT JOBS (opt-in)
  # -------------------------

  minio-mc-init:
    profiles: ["init"]
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "/minio_mc_init.sh"]
    volumes:
      - ../extensions/m8flow-backend/bin/minio_mc_init.sh:/minio_mc_init.sh:ro
    restart: "no"

  process-models-sync:
    profiles: ["init"]
    image: rclone/rclone:1.66.0
    depends_on:
      - minio-mc-init
    volumes:
      - process_models_cache:/cache
      - ../rclone.conf:/config/rclone/rclone.conf:ro
      - ../extensions/m8flow-backend/bin/process_models_sync.sh:/process_models_sync.sh:ro
    entrypoint: ["/bin/sh", "/process_models_sync.sh"]
    restart: "no"

  templates-sync:
    profiles: ["init"]
    image: rclone/rclone:1.66.0
    depends_on:
      - minio-mc-init
    volumes:
      - templates_cache:/cache
      - ../rclone.conf:/config/rclone/rclone.conf:ro
      - ../extensions/m8flow-backend/bin/templates_sync.sh:/templates_sync.sh:ro
    entrypoint: ["/bin/sh", "/templates_sync.sh"]
    restart: "no"

  smtp-attachments-sync:
    profiles: ["init"]
    image: alpine:3.20
    entrypoint:
      - /bin/sh
      - /smtp_attachments_sync.sh
      - ${M8FLOW_CONNECTOR_SMTP_ATTACHMENTS_USER_ACCESS_DIR:-/email_attachments}
    volumes:
      - smtp_attachments:${M8FLOW_CONNECTOR_SMTP_ATTACHMENTS_USER_ACCESS_DIR:-/email_attachments}
      - ${M8FLOW_CONNECTOR_SMTP_ATTACHMENTS_DIR:-../email_attachments}:/host_attachments:ro
      - ../extensions/m8flow-backend/bin/smtp_attachments_sync.sh:/smtp_attachments_sync.sh:ro
    restart: "no"

  slack-attachments-sync:
    profiles: ["init"]
    image: alpine:3.20
    entrypoint:
      - /bin/sh
      - /slack_attachments_sync.sh
      - ${M8FLOW_CONNECTOR_SLACK_ATTACHMENTS_USER_ACCESS_DIR:-/slack_attachments}
    volumes:
      - slack_attachments:${M8FLOW_CONNECTOR_SLACK_ATTACHMENTS_USER_ACCESS_DIR:-/slack_attachments}
      - ${M8FLOW_CONNECTOR_SLACK_ATTACHMENTS_DIR:-../slack_attachments}:/host_attachments:ro
      - ../extensions/m8flow-backend/bin/slack_attachments_sync.sh:/slack_attachments_sync.sh:ro
    restart: "no"

  # -------------------------
  # APP SERVICES
  # -------------------------

  m8flow-backend:
    build:
      context: ..
      dockerfile: docker/m8flow.backend.Dockerfile
    command: ["./extensions/m8flow-backend/bin/run_m8flow_backend.sh"]
    env_file: ../.env
    ports:
      - "8000:8000"
    volumes:
      - process_models_cache:/app/process_models
      - templates_cache:/app/templates
    depends_on:
      - m8flow-db
      - keycloak
      - redis
      - minio
      - nats
    environment:
      M8FLOW_NATS_ENABLED: "true"
      M8FLOW_NATS_URL: "nats://nats:4222"

  m8flow-celery-worker:
    build:
      context: ..
      dockerfile: docker/m8flow.backend.Dockerfile
    command: ["bash", "./extensions/m8flow-backend/bin/run_m8flow_celery_worker.sh"]
    env_file: ../.env
    volumes:
      - ${M8FLOW_BACKEND_CELERY_PROCESS_MODELS_MOUNT_SOURCE:-process_models_cache}:/app/process_models
    depends_on:
      - m8flow-db
      - keycloak
      - redis
      - minio

  m8flow-celery-flower:
    build:
      context: ..
      dockerfile: docker/m8flow.backend.Dockerfile
    command: ["bash", "./extensions/m8flow-backend/bin/run_m8flow_celery_worker.sh", "flower"]
    env_file: ../.env
    ports:
      - "5555:5555"
    depends_on:
      - m8flow-db
      - keycloak
      - redis
      - minio

  m8flow-frontend:
    build:
      context: ..
      dockerfile: docker/m8flow.frontend.Dockerfile
    env_file: ../.env
    ports:
      - "8001:80"
    depends_on:
      - m8flow-backend

  m8flow-connector-proxy:
    container_name: m8flow-connector-proxy
    image: m8flow/m8flow-connector-proxy
    build:
      context: ../m8flow-connector-proxy
    env_file: ../.env
    ports:
      - "${CONNECTOR_PROXY_PORT:-8004}:${CONNECTOR_PROXY_PORT:-8004}/tcp"
    volumes:
      - type: volume
        source: "smtp_attachments"
        target: "${M8FLOW_CONNECTOR_SMTP_ATTACHMENTS_USER_ACCESS_DIR:-/email_attachments}"
        read_only: true
      - type: volume
        source: "slack_attachments"
        target: "${M8FLOW_CONNECTOR_SLACK_ATTACHMENTS_USER_ACCESS_DIR:-/slack_attachments}"
        read_only: true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:${CONNECTOR_PROXY_PORT:-8004}/liveness || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  db-data:
    driver: local
  keycloak-db-data:
    driver: local
  redis-data:
    driver: local
  process_models_cache:
    driver: local
  templates_cache:
    driver: local
  minio_data:
    driver: local
  smtp_attachments:
    driver: local
  slack_attachments:
    driver: local
  nats_data:
    driver: local
